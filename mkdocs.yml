docs_dir: docs/site
site_dir: _site
site_name: SwarmKit
site_description: An open-source framework for composing, running, and growing multi-agent AI swarms.
site_url: https://delivstat.github.io/swarmkit/
repo_url: https://github.com/delivstat/swarmkit
repo_name: delivstat/swarmkit

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting started:
    - Installation: getting-started/install.md
    - Hello Swarm: getting-started/hello-swarm.md
  - Examples:
    - "SDLC pipeline (video walkthrough)": sdlc-example/index.html
  - Tutorials:
    - Overview: tutorials/index.md
    - "Level 1: Hello World": tutorials/01-hello-world.md
    - "Level 2: Archetypes": tutorials/02-archetypes.md
    - "Level 3: Skills": tutorials/03-skills.md
    - "Level 4: Multi-Agent": tutorials/04-multi-agent.md
    - "Level 5: MCP Tools": tutorials/05-mcp-tools.md
    - "Level 6: Structured Delegation": tutorials/06-structured-delegation.md
    - "Level 7: Governance & Safety": tutorials/07-governance.md
    - "Level 8: Observability": tutorials/08-observability.md
    - "Level 9: Conversations & Memory": tutorials/09-conversations-memory.md
    - "Level 10: Knowledge & RAG": tutorials/10-knowledge-rag.md
    - "Level 11: Serve & HTTP API": tutorials/11-serve-api.md
    - "Level 12: Triggers & Canary": tutorials/12-triggers-canary.md
    - "Level 13: Authoring & Review": tutorials/13-authoring-review.md
    - "Level 14: Packaging": tutorials/14-packaging.md
    - "Level 15: Production Example": tutorials/15-production-example.md
    - "Level 16: Pipelines & Contracts": tutorials/16-pipelines.md
  - Architecture:
    - Design overview: architecture/design-overview.md
    - Implementation plan: architecture/implementation-plan.md
  - Design notes:
    - Runtime:
      - LangGraph compiler: design-notes/langgraph-compiler.md
      - MCP client: design-notes/mcp-client.md
      - MCP discovery pattern: design-notes/mcp-discovery-pattern.md
      - Document reader MCP: design-notes/document-reader-mcp.md
      - Governance provider: design-notes/governance-provider-interface.md
      - Model provider: design-notes/model-provider-abstraction.md
      - DAG dependency graph: design-notes/dag-dependency-graph.md
      - Conversational authoring: design-notes/conversational-authoring.md
      - Structured output: design-notes/structured-output-governance.md
      - Executor abstraction: design-notes/executor-abstraction.md
      - Multi-party approval: design-notes/multi-party-approval.md
    - Pipelines & orchestration:
      - Gate funnel: design-notes/gate-funnel.md
      - Pipeline controller: design-notes/pipeline-controller.md
      - Orchestration provider seam: design-notes/orchestration-provider-seam.md
      - Pipeline triggering: design-notes/pipeline-triggering.md
      - Contract registry: design-notes/contract-registry.md
    - Observability (M6-M7):
      - OpenTelemetry observability: design-notes/opentelemetry-observability.md
      - Intent drift detection: design-notes/intent-drift-detection.md
      - Human interaction model: design-notes/human-interaction-model.md
    - Knowledge & skills:
      - Knowledge MCP Server: design-notes/knowledge-mcp-server.md
      - User Knowledge Server: design-notes/user-knowledge-server.md
      - Knowledge Curator topology: design-notes/knowledge-curator-topology.md
      - Skill registry: design-notes/skill-registry.md
    - Reference topologies:
      - Code Review Swarm: design-notes/topology-code-review.md
      - Skill Authoring Swarm: design-notes/topology-skill-authoring.md
    - Product & architecture:
      - Product architecture: design-notes/product-architecture.md
      - Product refinements: design-notes/product-architecture-refinements.md
      - Market analysis: design-notes/market-analysis-and-risk-mitigations.md
  - Reference:
    - CLI commands: reference/cli.md
    - Serve mode: reference/serve.md
    - Dual model support: reference/dual-model.md
    - Workspace memory: reference/workspace-memory.md
    - Environment configuration: reference/env-config.md
    - Telemetry configuration: reference/telemetry.md
    - Intent drift detection: reference/intent-drift.md
    - Notifications: reference/notifications.md
    - Topology artifact: reference/topology.md
    - Workspace artifact: reference/workspace.md
    - Skills catalogue: reference/skills.md
    - Archetypes catalogue: reference/archetypes.md
    - Trigger artifact: reference/trigger.md
    - Executor adapter artifact: reference/executor-adapter.md
    - Funnel artifact: reference/funnel.md
    - StageGraph artifact: reference/stage-graph.md
    - Contract artifact: reference/contract.md
    - Role registry artifact: reference/role-registry.md
    - Approval policy artifact: reference/approval-policy.md
  - Releases:
    - Changelog (all versions): releases/changelog.md
    - "v1.2 notes": releases/v1.2.md
    - "v1.1 notes": releases/v1.1.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true
