# SwarmKit fleet observability bundle — a turnkey OTel collector + trace/metric backends.
#
# Instances export OTLP to the collector (one endpoint); the collector fans out to Jaeger (traces)
# and Prometheus (metrics), and Grafana renders a prebuilt SwarmKit dashboard. This is the
# "recommended default" the design's open question asked for — still BYO-friendly (swap any backend).
#
#   docker compose -f deploy/observability/docker-compose.yml up -d
#
# Point an instance at it:
#   SWARMKIT_OTEL_EXPORTER=otlp SWARMKIT_OTEL_ENDPOINT=http://localhost:4318/v1/traces swarmkit serve
#
# UIs: Jaeger http://localhost:16686 · Grafana http://localhost:3001 (admin/admin) ·
#      Prometheus http://localhost:9090
#
# Images are unpinned for first-run convenience; pin tags for reproducible deployments.

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC (instances → collector)
      - "4318:4318" # OTLP HTTP (instances → collector)
      - "8889:8889" # Prometheus scrape (collector-exported metrics)
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true" # read-only viewing without login (dev convenience)
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000" # Grafana UI (3001 on the host to avoid clashing with the fleet UI dev server)
    depends_on:
      - prometheus
