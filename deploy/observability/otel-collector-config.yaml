# OTel Collector config for the SwarmKit fleet. Instances export OTLP here; the collector fans out.
#
# Fan-out is the answer to "can an instance publish to multiple collectors?" — a SwarmKit instance
# exports to ONE endpoint, and the collector multiplexes to as many backends as you list under each
# pipeline's `exporters`. Add another exporter (e.g. otlphttp to a SaaS) and list it in the pipeline.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Traces → Jaeger (OTLP).
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Metrics → exposed for Prometheus to scrape. resource_to_telemetry_conversion promotes resource
  # attributes (notably service.name → service_name) to metric labels, so the dashboard can filter
  # per instance.
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true
  # Example fan-out target — uncomment and list under a pipeline to also ship to a second backend:
  # otlphttp/honeycomb:
  #   endpoint: https://api.honeycomb.io
  #   headers:
  #     x-honeycomb-team: ${env:HONEYCOMB_API_KEY}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
