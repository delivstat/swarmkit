# SwarmKit control-plane rollout bundle (Phase 8, design details/control-plane/18).
#
#   docker compose -f deploy/control-plane/docker-compose.yml up -d --build
#
# A Caddy reverse proxy is the single front door on :8080 — it serves the fleet UI and
# proxies the panel API under /api, so the browser uses one origin (no CORS, no baked
# panel URL). The panel and UI are internal (not published to the host).
services:
  proxy:
    image: caddy:2-alpine
    container_name: swarmkit-control-plane-proxy
    restart: unless-stopped
    ports:
      - "8080:80"   # open http://localhost:8080
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - ui
      - panel

  panel:
    build:
      # Repo root, so the image can COPY packages/control-plane.
      context: ../..
      dockerfile: deploy/control-plane/Dockerfile
    image: swarmkit-control-plane
    container_name: swarmkit-control-plane
    restart: unless-stopped
    # Internal only — reached via the proxy at /api. (Add a `ports:` mapping to expose the
    # raw API directly, but note the trial command below runs it unauthenticated.)
    expose:
      - "8800"
    volumes:
      # Central stores survive restarts/upgrades. Back this volume up (see README).
      - control-plane-data:/data
    # The panel binds 0.0.0.0 in the container and REFUSES to start unauthenticated on a
    # non-loopback bind. This default trial command makes that choice explicit and insecure.
    # PRODUCTION: replace it with the auth block below (auth passes the guard by itself).
    command:
      - "--insecure-no-auth"   # ⚠️ trial only — anyone who reaches the panel has full control
    # PRODUCTION: comment out --insecure-no-auth above and uncomment/set these instead —
    # args append to the image ENTRYPOINT.
    # command:
    #   - "--operator-token=${SWARMKIT_CP_OPERATOR_TOKEN}"
    #   - "--oidc-issuer=${SWARMKIT_CP_OIDC_ISSUER}"
    #   - "--collector-endpoint=${SWARMKIT_CP_COLLECTOR}"   # OTLP endpoint instances export to
    #   - "--jaeger-url=${SWARMKIT_CP_JAEGER_URL}"
    #   - "--grafana-url=${SWARMKIT_CP_GRAFANA_URL}"
    # Fleet membership credentials (design 19) are stored ENCRYPTED. By default the panel uses a
    # local Fernet key (set SWARMKIT_CONTROL_PLANE_SECRET_KEY to persist across restarts). For
    # production, route them through the `bao` Transit engine below (`--profile vault`) — the key
    # never leaves the vault; the DB holds only vault:v1:… ciphertext. Then uncomment:
    # environment:
    #   SWARMKIT_CONTROL_PLANE_VAULT_ADDR: "http://bao:8200"
    #   SWARMKIT_CONTROL_PLANE_VAULT_TOKEN: "${SWARMKIT_CP_VAULT_TOKEN}"
    #   SWARMKIT_CONTROL_PLANE_VAULT_TRANSIT_KEY: "swarmkit-control-plane"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8800/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  ui:
    build:
      context: ../..
      dockerfile: deploy/control-plane/Dockerfile.ui
      args:
        # The UI calls the panel at /api, which the proxy strips + forwards to panel:8800.
        # Single-origin: no CORS, no host-specific URL baked into the image.
        NEXT_PUBLIC_CONTROL_PLANE_API: "/api"
    image: swarmkit-control-plane-ui
    container_name: swarmkit-control-plane-ui
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - panel

  # Vault backend for fleet membership credentials (design 19) — opt-in: `--profile vault`.
  # OpenBao (self-hostable OSS vault) in dev mode; `bao-init` enables the Transit engine + creates
  # the panel's key. For production, replace dev mode with a properly initialised/unsealed vault and
  # a scoped token. Wire the panel to it via the SWARMKIT_CONTROL_PLANE_VAULT_* env above.
  bao:
    image: openbao/openbao:latest
    container_name: swarmkit-control-plane-bao
    profiles: ["vault"]
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: "${SWARMKIT_CP_VAULT_TOKEN:-root}"
    command: ["server", "-dev", "-dev-root-token-id=${SWARMKIT_CP_VAULT_TOKEN:-root}", "-dev-listen-address=0.0.0.0:8200"]
    expose:
      - "8200"

  bao-init:
    image: curlimages/curl:latest
    container_name: swarmkit-control-plane-bao-init
    profiles: ["vault"]
    depends_on:
      - bao
    restart: "no"
    entrypoint:
      - "sh"
      - "-c"
      - |
        until curl -sf http://bao:8200/v1/sys/health; do sleep 1; done
        T="${SWARMKIT_CP_VAULT_TOKEN:-root}"
        curl -s -X POST -H "X-Vault-Token: $$T" http://bao:8200/v1/sys/mounts/transit -d '{"type":"transit"}' || true
        curl -s -X POST -H "X-Vault-Token: $$T" http://bao:8200/v1/transit/keys/swarmkit-control-plane -d '{}' || true

volumes:
  control-plane-data:
