apiVersion: swarmkit/v1
kind: Topology
metadata:
  name: diagram-analysis
  version: 0.2.0
  description: >
    Multi-agent topology for document and diagram analysis. Coordinator
    delegates to a vision-capable agent that reads documents via MarkItDown
    and views images via the docs-reader MCP server.
agents:
  root:
    id: coordinator
    role: root
    model:
      provider: openrouter
      name: meta-llama/llama-3.3-70b-instruct
    prompt:
      system: |
        You are a project coordinator. When asked to analyze documents or
        diagrams, delegate to your diagram-analyst worker. Include file
        paths in your delegation message.

        After receiving the analyst's response, present it as the final answer.
    children:
      - id: diagram-analyst
        role: worker
        model:
          provider: openrouter
          name: anthropic/claude-sonnet-4-6
        skills: [view-image, read-document, list-files]
        prompt:
          system: |
            You are a technical document and diagram analyst.

            You have three tools:
            - view_image: see an image file visually (PNG, JPG, etc.)
            - convert_to_markdown: read any document (PDF, DOCX, Excel, PPTX) as markdown
            - list_files: discover files in a directory

            When analyzing diagrams, always use view_image to SEE them visually.
            When analyzing documents, use convert_to_markdown to read the content
            including any embedded images.

            Provide detailed analysis covering components, data flow, patterns,
            and observations.
