apiVersion: swarmkit/v1
kind: Trigger
metadata:
  id: monitor-cameras
  name: Camera Monitoring Loop
  description: >
    LEGACY YOLO monitoring loop — RETIRED at the Phase 2b cutover in favour of
    the Frigate event poller (poll-frigate trigger). Kept disabled as a rollback
    path: re-enable this and set MINDER_POLLER_ALERTS=shadow to revert.
type: cron
enabled: false
targets:
  - minder-monitor
config:
  expression: "* * * * *"
  input: "Run the monitoring rules"
