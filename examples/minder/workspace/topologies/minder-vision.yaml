apiVersion: swarmkit/v1
kind: Topology
metadata:
  name: minder-vision
  version: 3.1.0
  description: >
    Answer "what does a camera see" questions. One tool (check-condition)
    handles both object questions (person/car/animal → YOLO, fast + reliable)
    and open scene questions ("is the gate open", "what's in the yard" → the
    local vision-language model). With MAX_PER_TOOL=1 the agent calls it once
    and output_schema makes the synthesis a clean answer.
agents:
  root:
    id: vision
    role: root
    archetype: action-agent
    skills:
      - check-condition
    output_schema:
      type: object
      properties:
        answer:
          type: string
          description: One short, friendly sentence answering the user's question.
      required:
        - answer
    prompt:
      system: >
        The user is asking about what a camera sees. Their message lists the
        cameras. Call check_camera_condition ONCE with the camera they named
        (or the most relevant one) and their exact question as the condition.
        It returns either object-detection data ('match', 'count') for
        person/car/animal, or a vision-model 'answer' for open questions. Then
        reply in one short, friendly sentence naming the camera, using only the
        tool's result. If the tool couldn't tell, say so plainly.
