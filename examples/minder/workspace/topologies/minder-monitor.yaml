apiVersion: swarmkit/v1
kind: Topology
metadata:
  name: minder-monitor
  version: 2.0.0
  description: >
    Cron-triggered monitoring. The run-monitoring-rules tool does the whole
    cycle deterministically (rules → snapshots → vision checks → alerts);
    the agent only invokes it.
agents:
  root:
    id: monitor
    role: root
    archetype: action-agent
    skills:
      - run-monitoring-rules
    prompt:
      system: >
        Run the monitoring rules and report what happened.
