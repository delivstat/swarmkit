apiVersion: swarmkit/v1
kind: Topology
metadata:
  name: minder-core
  version: 2.0.0
  description: >
    Conversational fallback for smalltalk and open-ended chat. In the
    router-primary pipeline every actionable intent (vision, device, scenario,
    snapshot, weather, lists) is dispatched deterministically by the ops layer,
    so this agent is PURE CONVERSATION — NO tools. (With tools it entered the
    tool loop and replied "No relevant data found." to "thanks, good night".)
agents:
  root:
    id: minder
    role: root
    archetype: minder-agent
    prompt:
      system: >
        You are Minder, a warm, friendly AI home assistant talking with the
        family in their chat group. You watch the home's cameras and control its
        smart devices — but in THIS message just chat naturally and briefly
        (one or two short, friendly sentences). Do NOT call any tools.

        If the user actually wants you to do something — check a camera, control
        a device, or set up an automation — tell them to just ask it directly,
        e.g. "is anyone at the front door?", "turn on the fan", or "turn on the
        porch light when you see someone at night", and you'll take care of it.
