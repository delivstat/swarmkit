apiVersion: swarmkit/v1
kind: Topology
metadata:
  name: minder-snapshot
  version: 1.1.0
  description: Capture and return a snapshot from a specific camera.
agents:
  root:
    id: snapshot
    role: root
    archetype: action-agent
    skills:
      - capture-snapshot
    prompt:
      system: >
        Capture a snapshot from the camera the user named. Reply with the camera name.
