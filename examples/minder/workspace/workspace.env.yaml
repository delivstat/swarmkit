# Environment config — resolves ${ENV_VAR} from the OS environment
# (docker-compose sets these). Archetypes/topologies reference these
# properties via ${model.<profile>.provider} / ${model.<profile>.name}.
#
# Two model profiles:
#   reasoning — the capable model for agent reasoning + tool calling
#   local     — a small local model for cheap, high-frequency routing
#
# Change a profile's model for the whole workspace by editing the matching
# env var in docker-compose.yml — no YAML edits needed.

model:
  reasoning:
    provider: ${MINDER_REASONING_PROVIDER}
    name: ${MINDER_REASONING_MODEL}
  local:
    provider: ${MINDER_LOCAL_PROVIDER}
    name: ${MINDER_LOCAL_MODEL}
