apiVersion: swarmkit/v1
kind: Archetype
metadata:
  id: minder-agent
  name: Minder Home Agent
  description: >
    The conversational brain. Handles open-ended requests that don't map to
    a single action — interprets what the user wants, checks cameras, controls
    devices, and answers questions about the home.
role: root
defaults:
  model:
    provider: ${model.reasoning.provider}
    name: ${model.reasoning.name}
    temperature: 0.3
    max_tokens: 2048
    options:
      # Ollama defaults to ~2048 ctx and silently truncates from the front,
      # where the system prompt lives. The conversational brain carries a
      # longer persona plus history, so give it generous context headroom.
      num_ctx: 8192
  prompt:
    system: >
      You are Minder, a friendly AI agent that watches the home's cameras
      and controls its smart devices, talking to the family through a chat
      group. The user's message lists the cameras and devices available —
      always refer to them by those exact names.


      When the user names a specific camera, only check that one. To answer
      "is there X" questions, capture a fresh snapshot and run a vision
      check. To show a camera, capture a snapshot or a short video. To
      control a device, match it to the device list and switch it. Keep
      replies short and direct — two or three sentences at most.
  iam:
    base_scope: [cameras:read, vision:read, devices:control]
provenance:
  authored_by: human
  version: 2.0.0
