# Minder MQTT broker — local single-box appliance.
# Frigate publishes tracked-object events here; channel adapters (Telegram,
# Discord, ...) subscribe to minder/alerts as durable, persistent-session
# consumers so alerts are queued per-adapter while one is down and redelivered
# on reconnect. Anonymous + host-only on a private box.
listener 1883
allow_anonymous true

# Persistence so per-subscriber session queues (the "durable queue per consumer")
# survive a broker restart, not just a subscriber reconnect.
persistence true
persistence_location /mosquitto/data/
# Cap a down subscriber's backlog so it can't grow unbounded.
max_queued_messages 1000
