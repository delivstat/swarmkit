services:
  # Home Assistant — hidden integration layer for smart device control
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    network_mode: host
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/minder/ha-init.sh"]
    volumes:
      - ha-config:/config
      - ./ha-init.sh:/minder/ha-init.sh:ro
    environment:
      - TZ=Asia/Kolkata

  # Seeds the generic Frigate template into the config volume on first boot
  # only (never overwrites). Keeps the committed template pristine — the real
  # per-install config is generated into the volume by Minder's
  # `configure_cameras`, never written back to the source tree.
  frigate-init:
    image: busybox
    volumes:
      - frigate-config:/config
      - ./frigate/config.yml:/seed/config.yml:ro
    command: sh -c "[ -f /config/config.yml ] || cp /seed/config.yml /config/config.yml"

  # Frigate — hidden perception sidecar for RTSP cameras (motion-gate, detect,
  # track, zones, and later crop-and-zoom VLM enrichment). CPU detector only;
  # the GPU stays free for Ollama. Its config lives in a volume (per-install
  # runtime state, like cameras.json) — Minder generates it from discovery.
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    network_mode: host
    restart: unless-stopped
    stop_grace_period: 30s
    shm_size: "512mb"
    depends_on:
      frigate-init:
        condition: service_completed_successfully
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - frigate-config:/config
      - frigate-media:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    environment:
      - TZ=${TZ:-Asia/Kolkata}
      - FRIGATE_RTSP_PASSWORD=${MINDER_CAM_PASS:-admin123}

  # Minder — SwarmKit runtime + onboarding webapp + Telegram bot in one container
  minder:
    build:
      context: .
      args:
        SWARMKIT_VERSION: "1.3.6"
    network_mode: host
    restart: unless-stopped
    volumes:
      - minder-data:/data
      # Recovery backups on a host path so they can be copied off-box.
      - ./backups:/backups
      # HA config, read-only, so Minder can back it up for full-stack DR
      # (restore is host-side via scripts/recover.sh — it must stop HA first).
      - ha-config:/ha-config:ro
    environment:
      - TZ=${TZ:-Asia/Kolkata}
      - MINDER_BACKUP_DIR=/backups
      - FRIGATE_URL=http://localhost:5000
      - MINDER_SUBNET=${MINDER_SUBNET:-192.168.0}
      - MINDER_CAM_USER=${MINDER_CAM_USER:-admin}
      - MINDER_CAM_PASS=${MINDER_CAM_PASS:-admin123}
      # Model profiles (consumed by workspace.env.yaml → archetypes/topologies).
      # ONE LLM does everything — reasoning, routing, the vision agent — so only
      # a single model loads. qwen2.5:3b replaced llama3.2:3b: it's far more
      # reliable at structured/tool calls (llama3.2 mangled tool args), benchmarked
      # best for routing, and at ~2GB it runs on the GPU with headroom. The VLM
      # (llava-phi3) stays on CPU; YOLO does object detection. No llama3.2.
      - MINDER_REASONING_PROVIDER=${MINDER_REASONING_PROVIDER:-ollama}
      - MINDER_REASONING_MODEL=${MINDER_REASONING_MODEL:-qwen2.5:3b}
      - MINDER_LOCAL_PROVIDER=${MINDER_LOCAL_PROVIDER:-ollama}
      - MINDER_LOCAL_MODEL=${MINDER_LOCAL_MODEL:-qwen2.5:3b}
      # Router profile points at the same model; kept as a separate knob so the
      # router can be swapped/placed independently if ever needed.
      - MINDER_ROUTER_PROVIDER=${MINDER_ROUTER_PROVIDER:-ollama}
      - MINDER_ROUTER_MODEL=${MINDER_ROUTER_MODEL:-qwen2.5:3b}
      # llava-phi3 (3.8B): the on-demand VLM. It does NOT hallucinate people
      # (moondream did — fatal for security) and warm it answers in ~5s on CPU.
      # The VLM runs on CPU/RAM (num_gpu=0, kept warm — see vision server) so it
      # never contends with llama3.2 for VRAM; on this box GPU model-loading
      # thrashes (100-240s). minicpm-v (8B) and qwen2.5vl (3B) are too slow for
      # CPU image inference (>300s); on a dedicated-GPU appliance use qwen2.5vl:3b
      # on the GPU. NOTE: object presence (person/car/animal) uses YOLO, not the
      # VLM — the VLM is only for open scene questions ("is the gate open").
      - MINDER_VISION_MODEL=${MINDER_VISION_MODEL:-llava-phi3}
      # Frigate event poller is the live alert source (Phase 2b cutover). The
      # YOLO monitor loop (monitor-cameras trigger) is disabled; set "shadow" to
      # roll back to parallel-run if needed.
      - MINDER_POLLER_ALERTS=${MINDER_POLLER_ALERTS:-live}
      # Frigate genai crop-and-zoom enrichment (local VLM). "on" or "off".
      # OFF by default: genai runs the VLM on every tracked detection 24/7,
      # which contends for VRAM on a shared box and doesn't drive alerts (the
      # detector + zones + scenarios do). Turn on only on a dedicated-GPU
      # appliance, and use a Frigate-recommended VLM (qwen2.5vl:3b / qwen3-vl:4b),
      # not moondream — moondream is fine for on-demand queries but weak for
      # situational event descriptions.
      - MINDER_GENAI=${MINDER_GENAI:-off}
      - MINDER_DATA_DIR=/data
      # Single-action agents: cap every tool at 2 calls, then the runtime
      # force-stops and the model synthesises from the result already in context.
      # On a 3B local model this is what produces a clean answer — 1 exits before
      # the synthesis turn; the framework read-tool default of 50 (tuned for
      # code-analysis file reads) lets one-shot lookups spiral. Both caps = 2.
      - SWARMKIT_MAX_PER_TOOL=${SWARMKIT_MAX_PER_TOOL:-2}
      - SWARMKIT_MAX_PER_READ_TOOL=${SWARMKIT_MAX_PER_READ_TOOL:-2}
      - MINDER_TELEGRAM_TOKEN=${MINDER_TELEGRAM_TOKEN:-}
      - OLLAMA_URL=http://localhost:11434
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - HA_URL=http://localhost:8123
      - HA_TOKEN=${HA_TOKEN:-}
      - SWARMKIT_URL=http://localhost:8321
    depends_on:
      - homeassistant

volumes:
  minder-data:
  ha-config:
  frigate-media:
  frigate-config:
