services:
  # Home Assistant — hidden integration layer for smart device control
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    network_mode: host
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/minder/ha-init.sh"]
    volumes:
      - ha-config:/config
      - ./ha-init.sh:/minder/ha-init.sh:ro
    environment:
      - TZ=Asia/Kolkata

  # MQTT broker — Frigate publishes tracked-object events here; the Minder webapp
  # subscribes for real-time alerting (replaces the up-to-60s poll lag). Host
  # networking + localhost:1883, consistent with the rest of the stack.
  mosquitto:
    image: eclipse-mosquitto:2
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      # Persist per-subscriber session queues across broker restarts.
      - mosquitto-data:/mosquitto/data

  # Seeds the generic Frigate template into the config volume on first boot
  # only (never overwrites). Keeps the committed template pristine — the real
  # per-install config is generated into the volume by Minder's
  # `configure_cameras`, never written back to the source tree.
  frigate-init:
    image: busybox
    volumes:
      - frigate-config:/config
      - ./frigate/config.yml:/seed/config.yml:ro
    command: sh -c "[ -f /config/config.yml ] || cp /seed/config.yml /config/config.yml"

  # Frigate — hidden perception sidecar for RTSP cameras (motion-gate, detect,
  # track, zones, and later crop-and-zoom VLM enrichment). CPU detector only;
  # the GPU stays free for Ollama. Its config lives in a volume (per-install
  # runtime state, like cameras.json) — Minder generates it from discovery.
  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    network_mode: host
    restart: unless-stopped
    stop_grace_period: 30s
    shm_size: "512mb"
    depends_on:
      frigate-init:
        condition: service_completed_successfully
      mosquitto:
        condition: service_started
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - frigate-config:/config
      - frigate-media:/media/frigate
      - type: tmpfs
        target: /tmp/cache
        tmpfs:
          size: 1000000000
    environment:
      - TZ=${TZ:-Asia/Kolkata}
      - FRIGATE_RTSP_PASSWORD=${MINDER_CAM_PASS:-admin123}

  # Minder — SwarmKit runtime + onboarding webapp + Telegram bot in one container
  minder:
    build:
      context: .
      args:
        SWARMKIT_VERSION: "1.8.0"
    network_mode: host
    restart: unless-stopped
    volumes:
      - minder-data:/data
      # Recovery backups on a host path so they can be copied off-box.
      - ./backups:/backups
      # HA config, read-only, so Minder can back it up for full-stack DR
      # (restore is host-side via scripts/recover.sh — it must stop HA first).
      - ha-config:/ha-config:ro
    environment:
      - TZ=${TZ:-Asia/Kolkata}
      - MINDER_BACKUP_DIR=/backups
      - FRIGATE_URL=http://localhost:5000
      - MINDER_SUBNET=${MINDER_SUBNET:-192.168.0}
      - MINDER_CAM_USER=${MINDER_CAM_USER:-admin}
      - MINDER_CAM_PASS=${MINDER_CAM_PASS:-admin123}
      # Model profiles (consumed by workspace.env.yaml → archetypes/topologies).
      # ONE LLM does everything — reasoning, routing, the vision agent — so only
      # a single model loads. qwen2.5:3b replaced llama3.2:3b: it's far more
      # reliable at structured/tool calls (llama3.2 mangled tool args), benchmarked
      # best for routing, and at ~2GB it runs on the GPU with headroom. The VLM
      # (llava-phi3) stays on CPU; YOLO does object detection. No llama3.2.
      - MINDER_REASONING_PROVIDER=${MINDER_REASONING_PROVIDER:-ollama}
      - MINDER_REASONING_MODEL=${MINDER_REASONING_MODEL:-qwen2.5:3b}
      - MINDER_LOCAL_PROVIDER=${MINDER_LOCAL_PROVIDER:-ollama}
      - MINDER_LOCAL_MODEL=${MINDER_LOCAL_MODEL:-qwen2.5:3b}
      # Router profile points at the same model; kept as a separate knob so the
      # router can be swapped/placed independently if ever needed.
      - MINDER_ROUTER_PROVIDER=${MINDER_ROUTER_PROVIDER:-ollama}
      - MINDER_ROUTER_MODEL=${MINDER_ROUTER_MODEL:-qwen2.5:3b}
      # qwen2.5vl:3b (3.8B): the on-demand VLM. Chosen on a CPU benchmark
      # (scripts/vlm_bench.py) over the low-res 352x288 detect-stream snapshot with
      # the grounded prompt: it gives a specific, grounded one-liner ("a dark sedan
      # partially obscured by a garage door") in ~70s, vs llava-phi3's vague "a car
      # in the garage" and granite3.2-vision's same-quality-but-141s. (At low res
      # it's ~70s, not the >300s seen on full-frame input — so we keep snapshots
      # low-res.) The VLM runs on CPU/RAM (num_gpu=0, kept warm) so it never
      # contends with the reasoning model for the 4GB GPU; only qwen2.5:3b is
      # resident there. NOTE: object presence (person/car/animal) is YOLO's job,
      # not the VLM's — the VLM only describes the alert snapshot / answers open
      # scene questions, and is hard-grounded + plate/identity-forbidden so a small
      # model can't fabricate (see _describe_prompt). moondream hallucinated people
      # — fatal for security — so it's out regardless of speed.
      - MINDER_VISION_MODEL=${MINDER_VISION_MODEL:-qwen2.5vl:3b}
      # Scenario Studio custom-detector auto-labeling (one-time setup only, NOT the
      # monitoring loop). Off unless an OpenRouter key is set; cloud is used only to
      # bootstrap training labels — the trained detector runs fully local.
      - MINDER_OPENROUTER_KEY=${MINDER_OPENROUTER_KEY:-}
      - MINDER_CLOUD_VISION_MODEL=${MINDER_CLOUD_VISION_MODEL:-google/gemini-2.5-flash}
      # Two model layers for vision (design/two-layer-vision-models.md):
      # LAYER 1 — per-alert enrichment in the Frigate poller (high frequency).
      #   MINDER_DESCRIBE_PROVIDER: "ollama" (local VLM, default — zero-cloud) or
      #   "openrouter" (cloud, MINDER_CLOUD_VISION_MODEL). Falls back to local.
      - MINDER_DESCRIBE_PROVIDER=${MINDER_DESCRIBE_PROVIDER:-ollama}
      # LAYER 2 — interactive queries + complex questions ("what is the person
      #   doing", "is there danger"): the capable model that reads + judges the
      #   scene. "ollama" (local, default) or "openrouter" + a multimodal model
      #   (MINDER_QUERY_MODEL, e.g. moonshotai/kimi-k2.6 — reasons + sees in one
      #   call). Falls back to the local VLM on cloud failure.
      - MINDER_QUERY_PROVIDER=${MINDER_QUERY_PROVIDER:-ollama}
      - MINDER_QUERY_MODEL=${MINDER_QUERY_MODEL:-}
      # The Frigate event poller is the sole monitoring path (the old YOLO loop
      # has been retired). "live" fires alerts; "shadow" is a dry-run that only
      # logs would-be alerts to poller_shadow.json.
      - MINDER_POLLER_ALERTS=${MINDER_POLLER_ALERTS:-live}
      # Real-time alerts: Frigate -> mosquitto (frigate/events) -> webapp
      # subscriber. The minute poller below stays as the reconcile backstop.
      - MINDER_MQTT=${MINDER_MQTT:-on}
      - MQTT_HOST=${MQTT_HOST:-localhost}
      - MQTT_PORT=${MQTT_PORT:-1883}
      # Reconcile backstop: the webapp polls Frigate events every MINDER_POLL_INTERVAL
      # seconds and applies the rules — DETERMINISTIC (calls poll_events directly,
      # no LLM agent; replaced the minder-poll topology + poll-frigate cron that
      # looped a 3B model over one deterministic tool call). Off -> MQTT only.
      - MINDER_POLL=${MINDER_POLL:-on}
      - MINDER_POLL_INTERVAL=${MINDER_POLL_INTERVAL:-60}
      # Recording (motion-based, short retain) so alerts can include the event
      # clip. Off -> snapshots only. Tune retain days for your disk.
      - MINDER_RECORD=${MINDER_RECORD:-on}
      - MINDER_RECORD_DAYS=${MINDER_RECORD_DAYS:-2}
      # Frigate genai crop-and-zoom enrichment (local VLM). "on" or "off".
      # OFF by default: genai runs the VLM on every tracked detection 24/7,
      # which contends for VRAM on a shared box and doesn't drive alerts (the
      # detector + zones + scenarios do). Turn on only on a dedicated-GPU
      # appliance, and use a Frigate-recommended VLM (qwen2.5vl:3b / qwen3-vl:4b),
      # not moondream — moondream is fine for on-demand queries but weak for
      # situational event descriptions.
      - MINDER_GENAI=${MINDER_GENAI:-off}
      # Post-match VLM enrichment: on an alert, describe the snapshot with the
      # local VLM and send it as a follow-up — both RTSP (Frigate) and HA-snapshot
      # cameras, only on the rare rule match (vs genai's every-detection load).
      # Non-blocking; generous timeout; graceful if the VLM is slow/down.
      - MINDER_DESCRIBE=${MINDER_DESCRIBE:-on}
      - MINDER_DESCRIBE_TIMEOUT=${MINDER_DESCRIBE_TIMEOUT:-90}
      - MINDER_DATA_DIR=/data
      # Single-action agents: cap every tool at 2 calls, then the runtime
      # force-stops and the model synthesises from the result already in context.
      # On a 3B local model this is what produces a clean answer — 1 exits before
      # the synthesis turn; the framework read-tool default of 50 (tuned for
      # code-analysis file reads) lets one-shot lookups spiral. Both caps = 2.
      - SWARMKIT_MAX_PER_TOOL=${SWARMKIT_MAX_PER_TOOL:-2}
      - SWARMKIT_MAX_PER_READ_TOOL=${SWARMKIT_MAX_PER_READ_TOOL:-2}
      - MINDER_TELEGRAM_TOKEN=${MINDER_TELEGRAM_TOKEN:-}
      # Discord adapter — runs alongside Telegram if set (multi-channel; the
      # ?channel= alert fan-out gives each channel every alert once).
      - MINDER_DISCORD_TOKEN=${MINDER_DISCORD_TOKEN:-}
      - OLLAMA_URL=http://localhost:11434
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - HA_URL=http://localhost:8123
      - HA_TOKEN=${HA_TOKEN:-}
      - SWARMKIT_URL=http://localhost:8321
    depends_on:
      - homeassistant

volumes:
  minder-data:
  ha-config:
  frigate-media:
  frigate-config:
  mosquitto-data:
