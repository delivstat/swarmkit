apiVersion: swarmkit/v1
kind: Funnel
metadata:
  id: consolidated-design-approval
  name: Consolidated Design Approval
  description: >
    Full four-layer quality gate for the consolidated-design artifact:
    deterministic schema validation, an LLM-as-judge rubric score, an
    architect harness review, then a multi-party human approval that is the
    only exit. See design/details/gate-funnel.md.
validate:
  schema: schemas/consolidated-design.json
  autocorrect: true
judge:
  skill: artifact-judge
  rubric: rubrics/consolidated-design.md
  threshold: 0.8
  max_retries: 2
review:
  archetype: architect-reviewer
  read_scope: [app:oms, app:web, app:mobile]
  route_back_at: high
approve:
  rules:
    - scope: design:approve
      roles: [oms-lead, web-lead, mobile-lead]
      quorum: all
    - scope: security:approve
      roles: [infosec-lead]
      quorum: all
  exclude_author: true
  min_distinct_approvers: 2
provenance:
  authored_by: human
  version: 1.0.0
