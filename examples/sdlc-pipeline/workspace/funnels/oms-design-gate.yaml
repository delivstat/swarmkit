apiVersion: swarmkit/v1
kind: Funnel
metadata:
  id: oms-design-gate
  name: OMS Design Gate
  description: >
    The one-app (OMS) design approval gate for slice 4: judge the OMS solution design
    against its rubric, then the OMS + Web leads sign off before the run advances.
judge:
  skill: artifact-judge
  rubric: rubrics/oms-design.md
  threshold: 0.8
  max_retries: 2
approve:
  rules:
    - scope: design:approve
      roles: [oms-lead, web-lead]
      quorum: all
  min_distinct_approvers: 2
provenance:
  authored_by: human
  version: 1.0.0
