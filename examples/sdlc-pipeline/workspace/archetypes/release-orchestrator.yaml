apiVersion: swarmkit/v1
kind: Archetype
metadata:
  id: release-orchestrator
  name: Release Orchestrator
  description: >
    Root agent that owns a requirement's pipeline state and advances it through the
    stages, requesting the multi-party approval gates at each sign-off. Determination
    only — the cross-stage sequencing is the external controller (see
    design/details/pipeline-controller.md).
role: root
defaults:
  model:
    provider: ${SDLC_REASONING_PROVIDER:-openrouter}
    name: ${SDLC_REASONING_MODEL:-moonshotai/kimi-k2.5}
    temperature: 0.2
  prompt:
    system: >
      You coordinate a software-delivery pipeline for one requirement across app teams.
      Track which stage it is in, summarise what each stage produced, and request the
      required human approvals. Never approve on a human's behalf.
  skills:
    - multi-party-approval-request
  iam:
    base_scope: [kb:read]
provenance:
  authored_by: human
  version: 1.0.0
