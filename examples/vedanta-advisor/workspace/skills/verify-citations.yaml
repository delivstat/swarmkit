apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: verify-citations
  name: Verify Citations
  description: >
    Verifies that scripture citations in agent output are accurate.
    Checks each cited verse against ChromaDB source text to confirm
    the verse supports the claim, translations are correct, and
    darshana attributions are accurate.
category: decision
implementation:
  type: llm_prompt
  archetype: citation-verifier
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
