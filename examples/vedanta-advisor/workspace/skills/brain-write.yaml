apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: brain-write
  name: Brain Write
  description: >
    Write a wisdom block page to GBrain. Creates a markdown page
    with YAML frontmatter containing theme, tags, darshana
    perspectives, life situations, and verse references. GBrain
    auto-extracts entity references and creates graph edges.
category: capability
implementation:
  type: mcp_tool
  server: gbrain
  tool: put_page
iam:
  required_scopes: [knowledge:write]
provenance:
  authored_by: human
  version: 1.0.0
