apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: detect-language
  name: Detect Language
  description: >
    Detect the language of input text. Supports English and
    22 Indian languages including Hindi, Tamil, Telugu, Bengali,
    Sanskrit, and romanized variants (Hinglish, Tanglish).
category: capability
implementation:
  type: mcp_tool
  server: translation
  tool: detect_language
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
