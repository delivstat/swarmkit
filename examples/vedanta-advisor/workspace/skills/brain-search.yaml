apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: brain-search
  name: Brain Search
  description: >
    Search the GBrain wisdom graph by theme, life situation,
    emotional state, or keyword. Returns matching wisdom blocks
    with their connections.
category: capability
implementation:
  type: mcp_tool
  server: gbrain
  tool: search
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
