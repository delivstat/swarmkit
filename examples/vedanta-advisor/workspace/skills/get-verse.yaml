apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: get-verse
  name: Get Verse
  description: >
    Get a specific verse by reference (e.g. gita:2:47). Returns
    Sanskrit, transliteration, all translations, all commentaries,
    and narrative context.
category: capability
implementation:
  type: mcp_tool
  server: scripture-search
  tool: get_verse
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
