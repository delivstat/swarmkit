apiVersion: swarmkit/v1
kind: Workspace
metadata:
  id: vedanta-advisor
  name: Vedanta Advisor
  description: >
    Conversational spiritual advisor grounded in Hindu religious texts.
    Provides life guidance with exact verse citations, multiple
    philosophical perspectives, and honest acknowledgment of gaps.
    Knowledge graph powered by GBrain; citation source via ChromaDB.
governance:
  provider: mock
  decision_skills:
    # Structural validation — checks block schema before write
    - id: gate-validator
      trigger: post_output
      scope: "graph-builder"
      config:
        gate_id: "wisdom-block"
    - id: gate-validator
      trigger: post_output
      scope: "graph-builder"
      config:
        gate_id: "knowledge-block"
    # Relevance gate — rejects off-topic queries and prompt injection
    # before the agent does any LLM work (zero wasted tokens)
    - id: relevance-gate
      trigger: pre_input
      scope: "advisor"
    # Citation verification — checks verse references are accurate
    - id: verify-citations
      trigger: post_output
      scope: "graph-builder,advisor"
    # Quality critique — reviews advisor responses for completeness
    - id: quality-critique
      trigger: post_output
      scope: "advisor"
    # Output sanitizer — blocks leakage of keys, prompts, internal config
    - id: output-sanitizer
      trigger: post_output
      scope: "advisor"
credentials:
  openrouter-key:
    source: env
    config:
      env: OPENROUTER_API_KEY
mcp_servers:
  # GBrain — wisdom graph (reasoning source)
  # The semantic knowledge graph: wisdom blocks, cross-text connections,
  # life-situation tags, emotional states, darshana perspectives.
  # Init: cd $VEDANTA_BRAIN_DIR && npx gbrain init
  # Requires: bun install -g github:garrytan/gbrain
  # Init: gbrain init --pglite --no-embedding
  # Config: gbrain config set expansion_model openrouter:anthropic/claude-haiku-4-5-20251001
  - id: gbrain
    transport: stdio
    command: ["gbrain", "serve"]

  # Scripture search — ChromaDB verse lookup (citation source)
  # Raw verses, translations, commentaries indexed per text family.
  # Ingest: python scripts/ingest-to-chromadb.py
  - id: scripture-search
    transport: stdio
    command: ["uv", "run", "scripture_search_server.py"]
    env:
      CHROMADB_PATH: "${VEDANTA_CHROMADB_DIR}"

  # Translation — IndicLID (language detection) + IndicTrans2 (translation)
  # Supports English + 22 Indian languages including Hindi, Tamil, Sanskrit
  # First run downloads models (~2GB). Subsequent runs use cache.
  - id: translation
    transport: stdio
    command: ["uv", "run", "translation_server.py"]

  # Gate validator — schema validation for wisdom/knowledge blocks
  - id: gate-validator
    transport: stdio
    command: ["uv", "run", "python", "-m", "swarmkit_runtime.gate_validator"]

  # Notes directory — agents write output here
  - id: notes
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "."]
    cwd: "${VEDANTA_NOTES_DIR}"
storage:
  checkpoints:
    backend: sqlite
    path: ./.swarmkit/state
  audit:
    backend: sqlite
