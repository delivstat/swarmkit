apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: get-full-chunk
  name: Get Full Chunk
  description: >
    Read the complete text of an FTS search result by chunk_id.
    When search-docs-exact returns a snippet, use this to get the full content.
category: capability
implementation:
  type: mcp_tool
  server: sterling-product-fts
  tool: get_full_chunk
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
