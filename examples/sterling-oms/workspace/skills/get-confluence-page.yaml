apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: get-confluence-page
  name: Get Confluence Page
  description: >
    Get the full content of a Confluence page by page ID. Pass the
    numeric page ID (found via search-confluence). Returns the page
    title, body content, and metadata.
category: capability
implementation:
  type: mcp_tool
  server: atlassian
  tool: confluence_get_page
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
