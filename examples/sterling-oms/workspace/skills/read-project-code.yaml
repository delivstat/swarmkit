apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: read-project-code
  name: Read Project Code
  description: Read a source file from the project codebase. Use relative paths like "extensions/src/com/example/MyClass.java".
category: capability
implementation:
  type: mcp_tool
  server: project-code
  tool: read_file
iam:
  required_scopes: [repo:read]
provenance:
  authored_by: human
  version: 1.0.0
