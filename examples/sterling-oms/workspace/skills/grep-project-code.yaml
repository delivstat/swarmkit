apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: grep-project-code
  name: Grep Project Code
  description: >
    Search file CONTENTS for a text pattern (like grep). Returns matching
    lines with file paths. Use for finding usages, implementations, references.
    Example: pattern="SourcingRule", file_glob="*.java"
category: capability
implementation:
  type: mcp_tool
  server: code-graph
  tool: grep_project_code
iam:
  required_scopes: [repo:read]
provenance:
  authored_by: human
  version: 1.0.0
