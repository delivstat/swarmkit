apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: search-project-code
  name: Search Project Code
  description: >
    Find files by name pattern in the project codebase.
    Use glob patterns: path=".", pattern="**/*SourcingRule*.java"
category: capability
implementation:
  type: mcp_tool
  server: project-code
  tool: search_files
iam:
  required_scopes: [repo:read]
provenance:
  authored_by: human
  version: 1.0.0
