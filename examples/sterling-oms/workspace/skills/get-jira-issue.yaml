apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: get-jira-issue
  name: Get Jira Issue
  description: >
    Get full details of a Jira issue by key (e.g. CROMA-1234). Returns
    summary, description, status, assignee, comments, and attachments.
category: capability
implementation:
  type: mcp_tool
  server: atlassian
  tool: jira_get_issue
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
