apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: get-confluence-attachments
  name: Download Confluence Attachments
  description: >
    Download and read attachment files from a Confluence page. Returns
    the content of attached documents. Pass the page ID.
category: capability
implementation:
  type: mcp_tool
  server: atlassian
  tool: get_confluence_attachments
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
