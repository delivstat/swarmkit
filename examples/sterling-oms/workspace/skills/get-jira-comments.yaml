apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: get-jira-comments
  name: Get Jira Issue Comments
  description: >
    Get all comments on a Jira issue. Use to find discussions, decisions,
    and context around a ticket. Pass the issue key (e.g. CROMA-1234).
category: capability
implementation:
  type: mcp_tool
  server: atlassian
  tool: jira_get_issue_comments
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
