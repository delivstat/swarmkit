apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: read-file-lines
  name: Read File Lines
  description: >
    Read specific line range from a source file. Use after grep to examine
    code at specific locations. Example: path="java-code/src/.../MyClass.java", start_line=100, end_line=200
category: capability
implementation:
  type: mcp_tool
  server: code-graph
  tool: read_file_lines
iam:
  required_scopes: [repo:read]
provenance:
  authored_by: human
  version: 1.0.0
