apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: search-jira
  name: Search Jira
  description: >
    Search Jira tickets using structured filters. Pass keywords as an
    array of strings — the tool builds valid JQL internally. Optionally
    filter by project, status, assignee, labels, dates.
category: capability
implementation:
  type: mcp_tool
  server: atlassian
  tool: search_jira
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
