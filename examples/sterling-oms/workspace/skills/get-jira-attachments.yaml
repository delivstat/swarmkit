apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: get-jira-attachments
  name: Download Jira Attachments
  description: >
    Download and read attachment files from a Jira issue. Returns the
    content of attached documents (docx, pdf, txt, xlsx). Pass the
    issue key (e.g. RT-679).
category: capability
implementation:
  type: mcp_tool
  server: atlassian
  tool: jira_download_attachments
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
