apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: download-confluence-pdf
  name: Download Confluence Page as PDF
  description: >
    Export a Confluence page as PDF and save to the review-docs directory.
    Preserves images, diagrams, and formatting. Pass the page ID (found
    via search-confluence). Returns the saved file path which can then
    be read with read-pdf or described with describe-pdf-page.
category: capability
implementation:
  type: mcp_tool
  server: pdf-reader
  tool: download_confluence_pdf
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
