apiVersion: swarmkit/v1
kind: Workspace
metadata:
  id: sterling-oms
  name: Sterling OMS Project Workspace
  description: >
    Multi-swarm workspace for an IBM Sterling OMS implementation.
    Four topologies: solution review, Q&A, code review, coding assistant.
    Backed by live Sterling API access, product documentation RAG,
    and reference design search.
governance:
  provider: mock
credentials:
  github-pat:
    source: env
    config:
      env: GITHUB_TOKEN
  sterling-creds:
    source: env
    config:
      env: STERLING_API_PASSWORD
mcp_servers:
  # Live Sterling API access — queries Application Manager config
  - id: sterling-api
    transport: stdio
    command: ["uv", "run", "sterling_api_server.py"]
    env:
      STERLING_API_URL: "${STERLING_API_URL}"
      STERLING_API_USER: "${STERLING_API_USER}"
      STERLING_API_PASSWORD: "${STERLING_API_PASSWORD}"
  # Sterling product docs — 17K files, ingest once, never changes
  # Product docs (markdown/HTML), Javadocs, ERD
  # Ingest with: STERLING_DOCS_DIR=$STERLING_PRODUCT_DOCS_DIR uv run scripts/ingest-docs.py
  - id: sterling-product-docs
    transport: stdio
    command: ["uvx", "chroma-mcp-server", "--client-type", "persistent", "--data-dir", "${STERLING_PRODUCT_DOCS_DIR}/chromadb"]
  # Full-text search over product docs — fast exact keyword matching
  - id: sterling-product-fts
    transport: stdio
    command: ["uv", "run", "fts_server.py"]
    env:
      FTS_DB_PATH: "${STERLING_PRODUCT_DOCS_DIR}/fts.db"
  # Project-specific documentation — design docs, integration specs
  # Code files (.java, .xsl, .xml) are NOT indexed here —
  # the developer agent reads those directly from the filesystem
  - id: sterling-project-docs
    transport: stdio
    command: ["uvx", "chroma-mcp-server", "--client-type", "persistent", "--data-dir", "${STERLING_PROJECT_DOCS_DIR}/chromadb"]
  # Reference designs from other projects (separate index)
  - id: reference-designs
    transport: stdio
    command: ["uvx", "chroma-mcp-server", "--client-type", "persistent", "--data-dir", "${REFERENCE_DESIGNS_DIR}/chromadb"]
  # Sterling API Javadocs — structured API documentation (1006 APIs)
  # Input/output XML, DTDs, user exits, events, samples
  - id: sterling-api-javadocs
    transport: stdio
    command: ["uv", "run", "sterling_javadocs_server.py"]
    env:
      STERLING_JAVADOCS_DIR: "${STERLING_JAVADOCS_DIR}"
  # Local project code — developer agent reads .java, .xsl, .xml directly
  - id: project-code
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "${STERLING_PROJECT_CODE_DIR}"]
  # Notes/output directory — agents write analysis, docs, explanations here
  - id: notes-dir
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-filesystem", "${STERLING_NOTES_DIR}"]
  # Code knowledge graph — structural queries over project code (optional)
  # Build graph first: cd $STERLING_PROJECT_CODE_DIR && uvx --from graphifyy graphify
  - id: code-graph
    transport: stdio
    command: ["uv", "run", "graphify_server.py"]
    env:
      STERLING_CODE_GRAPH: "${STERLING_CODE_GRAPH}"
  # GitHub for code access (PRs, remote repos)
  - id: github
    transport: stdio
    command: ["npx", "-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
    credentials_ref: github-pat
  # SwarmKit knowledge server (framework docs)
  - id: swarmkit-knowledge
    transport: stdio
    command: ["uv", "run", "python", "-m", "swarmkit_runtime.knowledge"]
storage:
  checkpoints:
    backend: sqlite
    path: ./.swarmkit/state
  audit:
    backend: sqlite
