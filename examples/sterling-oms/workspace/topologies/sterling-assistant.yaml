apiVersion: swarmkit/v1
kind: Topology
metadata:
  name: sterling-assistant
  description: >
    General-purpose Sterling assistant with sub-agent architecture.
    The architect coordinates three focused researchers (Jira, config,
    docs) each with 6-12 tools instead of one agent with 40+ tools.
  version: 2.0.0
agents:
  root:
    id: root
    role: root
    model:
      provider: openrouter
      name: meta-llama/llama-3.3-70b-instruct
      temperature: 0.1
    prompt:
      system: |
        You are the Sterling OMS project assistant. You MUST delegate
        every question to one or both of your specialist agents.
        NEVER answer a question yourself — you are a router, not an expert.

        ROUTING:
        - Jira tickets, design questions, configuration → sterling-architect
        - Code/implementation questions → sterling-developer
        - Questions touching both design and code → delegate to BOTH

        SYNTHESIS:
        - Pass through the worker's output AS-IS. Do NOT rewrite or
          summarise structured data (XML, tables, code, pipeline details).
        - If architect and developer disagree, flag the tension.
    children:
      - id: sterling-architect
        role: leader
        archetype: sterling-oms-architect
        children:
          - id: jira-researcher
            role: worker
            archetype: jira-researcher
          - id: config-analyst
            role: worker
            archetype: config-analyst
          - id: docs-researcher
            role: worker
            archetype: docs-researcher
      - id: sterling-developer
        role: worker
        archetype: sterling-developer
