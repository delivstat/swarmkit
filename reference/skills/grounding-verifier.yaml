apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: grounding-verifier
  name: Grounding Verifier
  description: >
    Checks agent output for unsourced claims, fabricated names or
    identifiers, and unverified acronym expansions. Returns a
    structured verdict with flagged items.
category: decision
outputs:
  type: object
  properties:
    verdict:
      type: string
      enum: [pass, fail, needs-revision]
    confidence:
      type: number
      minimum: 0
      maximum: 1
    reasoning:
      type: string
    flagged_items:
      type: array
      items:
        type: object
        properties:
          claim:
            type: string
          issue:
            type: string
            enum:
              - unsourced-claim
              - fabricated-name
              - unverified-acronym
              - fabricated-data
          severity:
            type: string
            enum: [critical, major, minor]
        required: [claim, issue, severity]
  required: [verdict, confidence, reasoning]
implementation:
  type: llm_prompt
  prompt: |
    You are a grounding verifier. Your job is to check whether an
    agent's output is factually grounded in the tools it called.

    For each factual claim in the output, check:
    1. Is it traceable to a specific tool call result? If not, flag
       it as "unsourced-claim".
    2. Does it name specific entities (people, services, tables,
       APIs, error codes) that weren't in any tool result? If so,
       flag as "fabricated-name".
    3. Does it expand acronyms without verification from a source?
       Flag as "unverified-acronym".
    4. Does it cite specific data (timestamps, counts, IDs) not in
       tool results? Flag as "fabricated-data".

    Opinions, analysis, and recommendations don't need grounding.
    Only flag factual claims about the system being investigated.

    Return JSON: verdict (pass if no critical/major flags, fail
    otherwise), confidence, reasoning, and flagged_items array.
provenance:
  authored_by: human
  version: 1.0.0
