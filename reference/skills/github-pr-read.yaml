apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: github-pr-read
  name: GitHub Pull Request Read
  description: >
    Lists and reads pull requests from a GitHub repository. Retrieves
    PR metadata, diff, comments, and review status. Wraps the official
    GitHub MCP server's get_pull_request and list_pull_requests tools.
category: capability
implementation:
  type: mcp_tool
  server: github
  tool: get_pull_request
iam:
  required_scopes: [repo:read]
provenance:
  authored_by: human
  version: 1.0.0
