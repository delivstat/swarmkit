apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: list-reference-skills
  name: List Reference Skills
  description: >
    Lists all reference skills shipped with SwarmKit, including their
    metadata, category, and MCP server/tool bindings. Used by the
    authoring swarm to check what already exists before generating
    new skills.
category: capability
implementation:
  type: mcp_tool
  server: swarmkit-knowledge
  tool: list_reference_skills
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
