apiVersion: swael/v1
kind: Skill
metadata:
  id: read-workspace-file
  name: Read Workspace File
  description: >
    Reads an existing YAML file from a workspace directory. Used by
    the schema drafter in edit mode to read current configuration
    before making targeted modifications.
category: capability
implementation:
  type: mcp_tool
  server: swael-knowledge
  tool: read_workspace_file
iam:
  required_scopes: [workspace:read]
provenance:
  authored_by: human
  version: 1.0.0
