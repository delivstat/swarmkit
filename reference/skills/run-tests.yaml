apiVersion: swael/v1
kind: Skill
metadata:
  id: run-tests
  name: Run Tests
  description: >
    Executes a pytest file against a workspace and returns pass/fail
    with stdout/stderr output. Restricted to test_*.py / *_test.py
    files under the workspace directory. Used by the test-runner agent
    to verify authored artifacts actually work.
category: capability
implementation:
  type: mcp_tool
  server: swael-knowledge
  tool: run_pytest
iam:
  required_scopes: [tests:execute]
provenance:
  authored_by: human
  version: 1.0.0
