apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: gate-validator
  name: Gate Validator
  description: >
    Validates structured agent output against file-based JSON Schema gates.
    Each gate is a schema file in the workspace gates/ directory. Drop a
    schema file to create a validation rule — no external service needed.
category: decision
outputs:
  type: object
  properties:
    verdict:
      type: string
      enum: [pass, fail]
    confidence:
      type: number
      minimum: 0
      maximum: 1
    reasoning:
      type: string
    flagged_items:
      type: array
      items:
        type: string
  required: [verdict, confidence, reasoning]
implementation:
  type: mcp_tool
  server: gate-validator
  tool: validate_gate
provenance:
  authored_by: human
  version: 1.0.0
