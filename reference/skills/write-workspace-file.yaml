apiVersion: swael/v1
kind: Skill
metadata:
  id: write-workspace-file
  name: Write Workspace File
  description: >
    Writes a YAML artifact to a workspace directory. Path-restricted
    to allowed subdirectories (topologies/, skills/, archetypes/,
    triggers/, schedules/) and workspace.yaml. Used by the publisher
    agent in the authoring swarm.
category: capability
implementation:
  type: mcp_tool
  server: swael-knowledge
  tool: write_workspace_file
iam:
  required_scopes: [workspace:write]
provenance:
  authored_by: human
  version: 1.0.0
