apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: citation-checker
  name: Citation Checker
  description: >
    Stricter than grounding-verifier. Requires every factual claim to
    have an explicit citation (tool name, file path, ticket ID, etc).
    Best for research-heavy topologies where traceability matters.
category: decision
outputs:
  type: object
  properties:
    verdict:
      type: string
      enum: [pass, fail, needs-revision]
    confidence:
      type: number
      minimum: 0
      maximum: 1
    reasoning:
      type: string
    uncited_claims:
      type: array
      items:
        type: object
        properties:
          claim:
            type: string
          expected_citation_type:
            type: string
            enum:
              - tool-result
              - file-path
              - ticket-id
              - url
              - log-entry
          severity:
            type: string
            enum: [critical, major, minor]
        required: [claim, severity]
  required: [verdict, confidence, reasoning]
implementation:
  type: llm_prompt
  prompt: |
    You are a citation checker for research output. Every factual
    claim in the output must cite its source explicitly.

    Acceptable citation forms:
    - Tool name: "According to get-jira-issue(PROJ-123)..."
    - File path: "In /path/to/file.java:42..."
    - Ticket ID: "PROJ-123 describes..."
    - Log entry: "Log timestamp 2024-01-15T10:30:00..."
    - URL: "The Confluence page at..."

    Check each factual claim. If a claim states specific data
    (names, IDs, counts, status, configuration values) without
    citing where that data came from, flag it.

    Opinions, recommendations, and analysis don't need citations.
    Only factual claims about the system being investigated.

    Return JSON: verdict (pass if all major claims cited, fail
    otherwise), confidence, reasoning, and uncited_claims array.
provenance:
  authored_by: human
  version: 1.0.0
