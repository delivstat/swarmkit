apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: memory-reader
  name: Memory Reader
  description: >
    Searches workspace memory for relevant prior conversations and
    injects context into the agent's prompt. Fires as a pre_input
    decision skill. Enables agents to reference past interactions
    naturally — "As we discussed previously..."
category: decision
outputs:
  type: object
  properties:
    verdict:
      type: string
      enum: [pass]
    confidence:
      type: number
    reasoning:
      type: string
    memories_found:
      type: integer
  required: [verdict, confidence, reasoning]
implementation:
  type: memory_hook
  hook: retrieve_context
  config:
    max_results: 5
    similarity_threshold: 0.1
    search_scope: user
provenance:
  authored_by: human
  version: 1.0.0
