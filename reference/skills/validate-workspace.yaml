apiVersion: swael/v1
kind: Skill
metadata:
  id: validate-workspace
  name: Validate Workspace
  description: >
    Resolves a workspace directory and returns the resolved state
    (topology names, agent IDs, skill bindings) or structured
    validation errors. Used by the validator agent to check authored
    artifacts before publication.
category: capability
implementation:
  type: mcp_tool
  server: swael-knowledge
  tool: validate_workspace
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
