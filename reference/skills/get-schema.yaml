apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: get-schema
  name: Get Artifact Schema
  description: >
    Returns the canonical JSON Schema for a SwarmKit artifact type
    (topology, skill, archetype, workspace, trigger). Used by the
    schema drafter to generate correct YAML.
category: capability
implementation:
  type: mcp_tool
  server: swarmkit-knowledge
  tool: get_schema
iam:
  required_scopes: [knowledge:read]
provenance:
  authored_by: human
  version: 1.0.0
