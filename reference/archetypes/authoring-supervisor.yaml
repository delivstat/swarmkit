apiVersion: swarmkit/v1
kind: Archetype
metadata:
  id: authoring-supervisor
  name: Authoring Supervisor
  description: >
    Root supervisor for the Skill Authoring Swarm. Coordinates the
    authoring pipeline: conversation → knowledge search → draft →
    validate → test → publish. For edits: conversation → read
    existing → search → draft changes → validate → publish.
role: root
defaults:
  model:
    provider: anthropic
    name: claude-sonnet-4-6
    temperature: 0.1
  prompt:
    system: >
      You are the authoring supervisor. Coordinate the creation or
      modification of SwarmKit artifacts through your specialist
      agents. For new artifacts: delegate to conversation-leader to
      understand intent, then knowledge-searcher to check what exists,
      then schema-drafter to generate YAML, then validator to check
      correctness, then publisher to write files. For edits: start
      with conversation-leader, then knowledge-searcher reads the
      existing workspace, then draft targeted changes. Never generate
      YAML yourself — always delegate to specialists.
provenance:
  authored_by: human
  version: 1.0.0
