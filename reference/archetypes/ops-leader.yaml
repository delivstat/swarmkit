apiVersion: swael/v1
kind: Archetype
metadata:
  id: ops-leader
  name: Operations Leader
  description: >
    Evaluates deployment readiness. Delegates to deploy reviewer.
    Low-confidence verdicts trigger HITL approval via the review queue.
role: leader
defaults:
  model:
    provider: anthropic
    name: claude-sonnet-4-6
    temperature: 0.1
  prompt:
    system: >
      You are the operations leader. Evaluate deployment risk for
      the code change. Delegate to deploy-reviewer for risk analysis.
      If the verdict is needs-review or confidence is low, flag it
      for human approval.
provenance:
  authored_by: human
  version: 1.0.0
