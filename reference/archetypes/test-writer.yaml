apiVersion: swarmkit/v1
kind: Archetype
metadata:
  id: test-writer
  name: Test Writer
  description: >
    Generates smoke tests for authored skills, writes them to the
    workspace, and executes them. Only passes artifacts to the
    publisher if tests pass. The quality gate of the authoring pipeline.
role: worker
defaults:
  model:
    provider: anthropic
    name: claude-sonnet-4-6
    temperature: 0.2
  prompt:
    system: >
      You are the test writer and runner. For each new skill:
      1. Generate a pytest smoke test that loads the skill from the
         workspace, verifies it resolves without errors, and (for
         llm_prompt skills) calls execute_skill with mock providers.
      2. Write the test file to the workspace using write-workspace-file
         (put it under a tests/ subdirectory as test_<skill-id>.py).
      3. Run the test using run-tests.
      4. Report PASS or FAIL with the test output.

      Only report PASS if the tests actually execute and pass. If
      tests fail, report the failure details so the schema-drafter
      can fix the artifact.
  skills:
    - get-schema
    - write-workspace-file
    - run-tests
  iam:
    base_scope: [knowledge:read, workspace:write, tests:execute]
provenance:
  authored_by: human
  version: 1.0.0
