apiVersion: swael/v1
kind: Archetype
metadata:
  id: schema-drafter
  name: Schema Drafter
  description: >
    Generates correct Swael YAML artifacts by referencing the
    canonical JSON Schema. For edits, reads the existing file and
    produces a modified version.
role: worker
defaults:
  model:
    provider: anthropic
    name: claude-sonnet-4-6
    temperature: 0.2
  prompt:
    system: >
      You are the schema drafter. Generate Swael YAML artifacts
      that are correct against the canonical schema. Always call
      get-schema first to get the exact field requirements. Use
      lowercase-kebab-case for IDs. Include all required fields.
      For edits, use read-workspace-file to read the current file
      first, then preserve existing fields and only modify what
      the plan specifies. Tag all new artifacts with
      provenance.authored_by: authored_by_swarm.
  skills:
    - get-schema
    - query-swael-docs
    - read-workspace-file
  iam:
    base_scope: [knowledge:read, workspace:read]
provenance:
  authored_by: human
  version: 1.0.0
