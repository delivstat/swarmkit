name: publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      # pnpm first (reads its version from package.json "packageManager"), then Node with pnpm cache
      # — the same ordering CI uses.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # The portal (swarmkit-webui) ships the static Next.js export. Build it and stage it into the
      # package BEFORE `uv build`, so the wheel carries the assets. See serve-hosted-webui.md.
      - name: Build the web portal
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @swarmkit/ui build
          rm -rf packages/webui/src/swarmkit_webui/_static
          cp -r packages/ui/out packages/webui/src/swarmkit_webui/_static

      - name: Build packages
        run: uv build --all-packages

      # The packages version independently, so a tag often bumps only some of them. Publish a package
      # only when its version isn't already on PyPI — skip-by-existence, not `--check-url`: a rebuilt
      # sdist of an unchanged version isn't byte-identical, and `--check-url` errors on that hash
      # mismatch (it verifies content) instead of skipping. A new version always publishes.
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          publish_if_new() {
            local pkg="$1" dist_prefix="$2" ver
            ver=$(uv version --package "$pkg" --short 2>/dev/null) || {
              echo "!! could not read version for $pkg"; return 1; }
            if curl -sf -o /dev/null "https://pypi.org/pypi/$pkg/$ver/json"; then
              echo "== $pkg $ver already on PyPI — skipping"
            else
              echo "== publishing $pkg $ver"
              uv publish dist/${dist_prefix}-${ver}.tar.gz dist/${dist_prefix}-${ver}-*.whl
            fi
          }
          publish_if_new swarmkit-schema  swarmkit_schema
          publish_if_new swarmkit-runtime swarmkit_runtime
          publish_if_new swarmkit-webui   swarmkit_webui
