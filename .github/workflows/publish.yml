name: publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6

      - name: Build packages
        run: uv build --all-packages

      - name: Publish swael-schema
        run: uv publish dist/swael_schema-*.tar.gz dist/swael_schema-*.whl
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Publish swael-runtime
        run: uv publish dist/swael_runtime-*.tar.gz dist/swael_runtime-*.whl
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
