name: publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      # pnpm first (reads its version from package.json "packageManager"), then Node with pnpm cache
      # — the same ordering CI uses.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # The portal (swarmkit-webui) ships the static Next.js export. Build it and stage it into the
      # package BEFORE `uv build`, so the wheel carries the assets. See serve-hosted-webui.md.
      - name: Build the web portal
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @swarmkit/ui build
          rm -rf packages/webui/src/swarmkit_webui/_static
          cp -r packages/ui/out packages/webui/src/swarmkit_webui/_static

      - name: Build packages
        run: uv build --all-packages

      # --check-url skips files already on PyPI instead of erroring. The two packages version
      # independently, so a runtime-only release (runtime bumped, schema unchanged) must not fail on
      # re-uploading the existing schema — and vice versa. New versions still publish normally.
      - name: Publish swarmkit-schema
        run: uv publish --check-url https://pypi.org/simple/ dist/swarmkit_schema-*.tar.gz dist/swarmkit_schema-*.whl
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Publish swarmkit-runtime
        run: uv publish --check-url https://pypi.org/simple/ dist/swarmkit_runtime-*.tar.gz dist/swarmkit_runtime-*.whl
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

      - name: Publish swarmkit-webui
        run: uv publish --check-url https://pypi.org/simple/ dist/swarmkit_webui-*.tar.gz dist/swarmkit_webui-*.whl
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
