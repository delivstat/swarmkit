[project]
name = "swarmkit-webui"
version = "0.1.0"
description = "SwarmKit web portal — the static Next.js build, served by `swarmkit serve`."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Srijith Kartha" }]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/swarmkit_webui"]

# The static bundle under _static/ is built by `just build-webui` (pnpm export → copy) before
# packaging; hatch includes it as package data. Force-include so an empty tree still packages.
[tool.hatch.build.targets.wheel.force-include]
"src/swarmkit_webui/_static" = "swarmkit_webui/_static"
