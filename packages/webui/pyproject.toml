[project]
name = "swarmkit-webui"
version = "0.1.0"
description = "SwarmKit web portal — the static Next.js build, served by `swarmkit serve`."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Srijith Kartha" }]
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# The static bundle under src/swarmkit_webui/_static/ is built by `just build-webui` (pnpm export →
# copy) and is gitignored, so hatch's default VCS file walk skips it. `artifacts` includes those
# built outputs as package data — once, at their natural path (a force-include double-adds them).
[tool.hatch.build]
artifacts = ["src/swarmkit_webui/_static/**"]

[tool.hatch.build.targets.wheel]
packages = ["src/swarmkit_webui"]
