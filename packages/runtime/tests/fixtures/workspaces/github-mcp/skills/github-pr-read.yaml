apiVersion: swael/v1
kind: Skill
metadata:
  id: github-pr-read
  name: GitHub Pull Request Read
  description: >
    Reads pull requests from a GitHub repository. Wraps the official
    GitHub MCP server's get_pull_request tool.
category: capability
implementation:
  type: mcp_tool
  server: github
  tool: get_pull_request
iam:
  required_scopes: [repo:read]
provenance:
  authored_by: human
  version: 1.0.0
