apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: code-quality-review
  name: Code Quality Review
  description: Evaluates a code diff against a quality rubric; returns verdict + reasoning.
category: decision
outputs:
  type: object
  properties:
    verdict:
      type: string
      enum: [pass, fail]
    confidence:
      type: number
      minimum: 0
      maximum: 1
    reasoning:
      type: string
  required: [verdict, confidence, reasoning]
implementation:
  type: mcp_tool
  server: rynko-flow
  tool: validate_code_review
provenance:
  authored_by: human
  version: 1.0.0
