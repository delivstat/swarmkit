[project]
name = "swarmkit-schema"
version = "1.16.0"
description = "SwarmKit JSON Schemas + Python validator."
readme = {text = "SwarmKit canonical JSON Schemas + Python validator. See https://github.com/delivstat/swarmkit", content-type = "text/markdown"}
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Srijith Kartha" }]
keywords = ["swarmkit", "schema", "json-schema", "multi-agent", "validation"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

dependencies = [
    "jsonschema>=4.23",
    "pydantic>=2.8",
    "pyyaml>=6.0",
    "referencing>=0.35",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "mypy>=1.11",
    "ruff>=0.6",
    "types-pyyaml",
    "types-jsonschema",
]

[project.urls]
Homepage = "https://github.com/delivstat/swarmkit"
Documentation = "https://delivstat.github.io/swarmkit/"
Repository = "https://github.com/delivstat/swarmkit"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/swarmkit_schema"]
