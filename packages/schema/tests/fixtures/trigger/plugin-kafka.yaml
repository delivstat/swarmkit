# Plugin trigger — provider_id names a TriggerProvider registered via the
# `swael.trigger_providers` entry-points group. Runtime validates the
# config shape; schema only enforces provider_id presence.
apiVersion: swael/v1
kind: Trigger
metadata:
  id: kafka-agent-tasks
  name: Kafka Agent Tasks
type: plugin
provider_id: acme-kafka-trigger
targets:
  - agent-task-processor
config:
  bootstrap_servers: [kafka.acme.internal:9092]
  topic: agent-tasks
  group_id: swael-consumer
