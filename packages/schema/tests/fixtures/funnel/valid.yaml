# Full funnel — all four layers, the heavyweight design gate from the SDLC example.
apiVersion: swarmkit/v1
kind: Funnel
metadata:
  id: consolidated-design-gate
  name: Consolidated Design Gate
  description: The multi-app design approval gate — validate, judge, architect review, then sign-off.
validate:
  schema: schemas/consolidated-design.json
  autocorrect: true
judge:
  skill: artifact-judge
  rubric: rubrics/consolidated-design.md
  threshold: 0.8
  max_retries: 2
review:
  archetype: architect-reviewer
  read_scope: [app:oms, app:web, app:mobile]
  route_back_at: high
approve:
  rules:
    - scope: design:approve
      roles: [oms-lead, web-lead, mobile-lead]
      quorum: all
    - scope: security:approve
      roles: [infosec-lead]
      quorum: all
  exclude_author: true
  on_revision: reset_all
  min_distinct_approvers: 2
provenance:
  authored_by: human
  version: 1.0.0
