# The SDLC pipeline as data: intake -> design (gated, locked) -> build -> sit, plus a defect loop.
apiVersion: swarmkit/v1
kind: StageGraph
metadata:
  id: sdlc-pipeline
  name: SDLC Pipeline
  description: One requirement across intake, design, build, and SIT, correlated by requirement id.
stages:
  - id: intake
    topology: oms-intake
    when: [requirement.created]
    success: design.kickoff
  - id: design
    topology: oms-design
    when: [design.kickoff]
    locks: [contract:oms-web, contract:oms-inventory]
    gate: oms-design-gate
    success: design.approved
    release_locks_on: design.approved
    compensation: oms-compensate-design
  - id: build
    topology: oms-build
    when: [design.approved]
    success: build.ready-in-qa
  - id: sit
    topology: oms-sit
    when: [build.ready-in-qa]
    success: sit.passed
  - id: defect-triage
    topology: oms-defect-triage
    success: defect.fixed
  - id: re-test
    topology: oms-sit
    success: sit.passed
loops:
  - when: defect.raised
    to: defect-triage
  - when: defect.fixed
    to: re-test
provenance:
  authored_by: human
  version: 1.0.0
