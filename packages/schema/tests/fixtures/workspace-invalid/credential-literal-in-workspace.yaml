# Credentials use the uniform { source, config } shape with
# additionalProperties: false at the top level. Adding a `value` field
# outside config (or omitting config) makes the literal an anti-pattern
# that the schema rejects.
apiVersion: swarmkit/v1
kind: Workspace
metadata:
  id: broken
  name: Broken
credentials:
  anthropic_api_key:
    source: env
    config:
      env: ANTHROPIC_API_KEY
    value: sk-literal-would-be-terrible        # not part of the uniform shape
