apiVersion: swarmkit/v1
kind: Topology
metadata:
  name: with-model-options
  version: 0.1.0
agents:
  root:
    id: coordinator
    role: root
    model:
      provider: ollama
      name: llama3.2:3b
      temperature: 0
      options:
        num_ctx: 8192
        repeat_penalty: 1.15
    children:
      - id: writer
        role: worker
        model:
          provider: openai
          name: gpt-4o
          options:
            top_p: 0.9
            frequency_penalty: 0.2
