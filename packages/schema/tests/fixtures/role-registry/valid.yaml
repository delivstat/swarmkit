apiVersion: swarmkit/v1
kind: RoleRegistry
metadata:
  id: sdlc-roles
  name: SDLC approver roles
  description: Roles for the software-delivery pipeline. A role carries many scopes.
roles:
  - id: oms-lead
    members: [alice]
    scopes: [design:approve, code:approve, deploy:approve]
  - id: web-lead
    members: [bob]
    scopes: [design:approve, code:approve]
  - id: infosec-lead
    members: [dana]
    scopes: [security:approve]
  - id: eng-manager
    members: [grace, heidi]
    scopes: [release:approve, code:approve]
