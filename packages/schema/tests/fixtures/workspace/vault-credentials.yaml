# Credentials sourced from various managed secrets backends. All sources
# share the uniform shape { source, config } — per-source config shape is
# documented in design/details/workspace-schema-v1.md and validated by the
# runtime (not by the schema).
apiVersion: swarmkit/v1
kind: Workspace
metadata:
  id: multi-vault-workspace
  name: Multi-Vault Workspace
credentials:
  anthropic_api_key:
    source: hashicorp-vault
    config:
      address: https://vault.acme.internal
      path: secret/data/swarmkit/anthropic
      field: api_key
  openai_api_key:
    source: aws-secrets-manager
    config:
      secret_id: swarmkit/openai-key
      region: us-east-1
  google_api_key:
    source: gcp-secret-manager
    config:
      project: acme-123
      secret: swarmkit-google-key
      version: latest
  azure_api_key:
    source: azure-key-vault
    config:
      vault_url: https://acme.vault.azure.net
      secret_name: swarmkit-azure-key
  internal_token:
    source: plugin
    provider_id: acme-internal-secrets
    config:
      service: swarmkit
      key: internal-token
  bootstrap_cert:
    source: file
    config:
      path: /etc/swarmkit/bootstrap.pem
