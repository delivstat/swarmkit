apiVersion: swarmkit/v1
kind: ExecutorAdapter
metadata:
  id: relay-no-driver
  name: Relay No Driver
  description: invalid — on_unanswerable relay requires an interaction block with a driver
spec:
  launch:
    command: [h, run, "{task.statement}"]
  stream:
    format: jsonl
  event_map:
    - emit:
        - event: result
          with: { status: success }
  on_unanswerable: relay
provenance:
  authored_by: human
  version: 0.1.0
