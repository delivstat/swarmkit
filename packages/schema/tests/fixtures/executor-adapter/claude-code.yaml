apiVersion: swarmkit/v1
kind: ExecutorAdapter
metadata:
  id: claude-code
  name: Claude Code
  description: Anthropic's agentic coding harness, run headless with stream-json output.
spec:
  launch:
    command:
      - claude
      - -p
      - "{task.statement}"
      - --output-format
      - stream-json
      - --verbose
    optional_args:
      - when: budget.max_turns
        args: [--max-turns, "{budget.max_turns}"]
      - when: config.model
        args: [--model, "{config.model}"]
      # Constrain the tool grant (space/comma-separated). When set, tools outside it are denied and
      # surface for relay; unset (the default) means all tools, so relay never engages.
      - when: config.allowed_tools
        args: [--allowedTools, "{config.allowed_tools}"]
      # The governed MCP gateway: SwarmKit generates this config (pointing the harness at an
      # in-process gateway that routes every MCP call through governance + audit) and sets
      # task.mcp_config when the agent has granted MCP tools. Absent ⇒ the harness gets no MCP.
      - when: task.mcp_config
        args: [--mcp-config, "{task.mcp_config}"]
  auth:
    default: subscription
    modes:
      api_key:
        env:
          ANTHROPIC_API_KEY: "{credential.model_provider}"
      subscription:
        credential_paths:
          - ~/.claude
  stream:
    format: jsonl
    retain_raw: false
  event_map:
    - when: { type: system }
      set: { session_id: "$.session_id" }
    - when: { type: assistant }
      for_each: "$.message.content"
      emit:
        - when: { type: text }
          event: message
          with: { role: assistant, text: "$.text" }
        - when: { type: tool_use }
          event: tool_call
          with: { tool: "$.name", input_summary: "$.input" }
    - when: { type: assistant }
      emit:
        - event: usage
          with:
            input_tokens: "$.message.usage.input_tokens"
            output_tokens: "$.message.usage.output_tokens"
    # Result status is classified by ORDERED literal-match rules (most-specific wins — the
    # interpreter keeps the last result per line). Real Claude Code signals errors with
    # `subtype: success` + `is_error: true`, so status can't come from `subtype` alone.
    - when: { type: result }
      emit:
        - event: usage
          with:
            input_tokens: "$.usage.input_tokens"
            output_tokens: "$.usage.output_tokens"
            cached_tokens: "$.usage.cache_read_input_tokens"
            cost_usd: "$.total_cost_usd"
        - event: result
          with: { status: success, output: "$.result" }
    - when: { type: result, is_error: true }
      emit:
        - event: result
          with: { status: failure, output: "$.result" }
    - when: { type: result, subtype: error_max_turns }
      emit:
        - event: result
          with: { status: budget_exceeded, output: "$.result" }
    # relay (§6.2): a tool outside the grant is reported in result.permission_denials. Map each to an
    # approval_requested; the generic park-resume loop resolves it and relaunches with the grant.
    - when: { type: result }
      for_each: "$.permission_denials"
      emit:
        - event: approval_requested
          with: { capability: "$.tool_name" }
  resume:
    arg: [--resume, "{resume.token}"]
    prompt: "The requested permissions have been granted. Please continue and complete the task."
  grant:
    arg: [--allowedTools, "{grant.capabilities}"]
    separator: " "
  success_when: { exit_code: 0 }
  on_unanswerable: relay
  interaction:
    driver: park-resume
    max_approval_wait_seconds: 300
  telemetry_grade: normalized
  artifacts: { profile: files }
provenance:
  authored_by: vendor_published
  version: 1.0.0
  vendor: anthropic
