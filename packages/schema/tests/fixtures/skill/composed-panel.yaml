# Composition — a multi-persona panel (design §6.5, §8.6 Tier 3).
apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: multi-persona-panel
  name: Multi-Persona Evaluation Panel
  description: |
    Runs three specialised judges in parallel and combines their verdicts via
    majority consensus. Escalates to HITL on disagreement.
category: decision
outputs:
  type: object
  properties:
    verdict:
      type: string
      enum: [pass, fail, needs-review]
    confidence:
      type: number
      minimum: 0
      maximum: 1
    reasoning:
      type: string
      description: |
        Combined rationale from the panel — cites each judge's verdict and
        explains the consensus (or disagreement) in 2-3 sentences.
    panel_votes:
      type: array
      items:
        type: object
        properties:
          judge: { type: string }
          verdict: { type: string }
          confidence: { type: number, minimum: 0, maximum: 1 }
  required: [verdict, confidence, reasoning, panel_votes]
implementation:
  type: composed
  composes:
    - llm-judge-correctness
    - llm-judge-security
    - llm-judge-style
  strategy: parallel-consensus
provenance:
  authored_by: human
  version: 0.1.0
