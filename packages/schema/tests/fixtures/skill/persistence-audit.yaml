# Persistence skill — append to the audit log (design §5.4, §16.4).
apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: audit-log-write
  name: Audit Log Write
  description: |
    Records an agent event into the append-only audit log via the
    GovernanceProvider. Append-only; no update or delete path exists.
category: persistence
inputs:
  type: object
  properties:
    event_type:
      type: string
    payload:
      type: object
  required: [event_type, payload]
outputs:
  type: object
  properties:
    recorded:
      type: boolean
  required: [recorded]
implementation:
  type: mcp_tool
  server: agt_sre
  tool: record_event
iam:
  required_scopes: [audit:append]
provenance:
  authored_by: human
  version: 1.0.0
