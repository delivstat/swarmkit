# Adapted from the design doc §18.3 invoice-validation example, re-shaped
# under the v1 envelope (apiVersion/kind/metadata).
apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: invoice-validation-gate
  name: Invoice Validation Gate
  description: Validates invoice structure and content via Rynko Flow gate.
category: decision
inputs:
  invoice:
    type: object
    required: true
outputs:
  verdict:
    type: enum
    values: [pass, fail]
  run_id:
    type: string
    description: Attestation Run ID returned on a passing verdict.
  reasoning:
    type: string
    description: Two to three sentence summary of why this invoice passed or failed.
implementation:
  type: mcp_tool
  server: rynko_flow
  tool: validate_invoice_v3
provenance:
  authored_by: human
  version: 1.0.0
