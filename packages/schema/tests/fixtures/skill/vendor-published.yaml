# Exercises the vendor-published provenance variant (design §6.4).
apiVersion: swael/v1
kind: Skill
metadata:
  id: rynko-invoice-validator
  name: Rynko Invoice Validator
  description: |
    Validates invoice structure and content via the Rynko Flow gate.
    Vendor-published skill; trust posture governed by the vendor relationship.
category: decision
inputs:
  type: object
  properties:
    invoice:
      type: object
  required: [invoice]
outputs:
  type: object
  properties:
    verdict:
      type: string
      enum: [pass, fail]
    run_id:
      type: string
      description: Attestation Run ID returned on a passing verdict.
    reasoning:
      type: string
      description: |
        Plain-language summary of the vendor's validation outcome. When the
        vendor's API does not return a rationale natively, the skill wrapper
        synthesises one from the structured response so every audit entry
        still carries human-readable justification.
  required: [verdict, run_id, reasoning]
implementation:
  type: mcp_tool
  server: rynko_flow
  tool: validate_invoice_v3
provenance:
  authored_by: vendor_published
  vendor: rynko
  version: 3.2.1
