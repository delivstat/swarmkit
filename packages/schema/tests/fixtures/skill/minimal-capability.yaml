# Smallest valid skill — a capability wrapping an MCP tool, no inputs/outputs
# declared (runtime discovers them from the MCP server).
apiVersion: swarmkit/v1
kind: Skill
metadata:
  id: github-repo-read
  name: GitHub Repo Read
  description: Reads a repository's file tree and file contents via the GitHub MCP server.
category: capability
implementation:
  type: mcp_tool
  server: github
  tool: get_repo
provenance:
  authored_by: human
  version: 1.0.0
