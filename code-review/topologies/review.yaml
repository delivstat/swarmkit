apiVersion: swarmkit/v1
kind: Topology
metadata:
  name: review
  version: 0.1.0
agents:
  supervisor:
    id: supervisor
    role: supervisor
    model:
      provider: groq
      name: llama-3.3-70b-versatile
    prompt:
      system: You are the supervisor for code reviews.
    children:
      - id: quality-reviewer
        role: quality-reviewer
        archetype: code-quality
      - id: security-reviewer
        role: security-reviewer
        archetype: security