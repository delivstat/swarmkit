<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">How SwarmKit Works</text>

  <!-- INPUT LAYER -->
  <rect x="40" y="55" width="720" height="75" rx="8" fill="#1a1a2e" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="75" fill="#7ee787" font-size="11" font-weight="600" letter-spacing="1">YOU WRITE YAML</text>

  <rect x="60" y="85" width="200" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="160" y="100" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Topology</text>
  <text x="160" y="114" text-anchor="middle" fill="#8b949e" font-size="10">agents + hierarchy</text>

  <rect x="290" y="85" width="200" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="390" y="100" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Archetypes + Skills</text>
  <text x="390" y="114" text-anchor="middle" fill="#8b949e" font-size="10">reusable agent configs</text>

  <rect x="520" y="85" width="220" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="630" y="100" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">MCP Servers</text>
  <text x="630" y="114" text-anchor="middle" fill="#8b949e" font-size="10">7,000+ tools available</text>

  <!-- Arrow down -->
  <path d="M400,130 L400,150" stroke="#30363d" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#30363d"/></marker></defs>

  <!-- RUNTIME LAYER -->
  <rect x="40" y="155" width="720" height="105" rx="8" fill="#16213e" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="175" fill="#58a6ff" font-size="11" font-weight="600" letter-spacing="1">SWARMKIT RUNTIME</text>

  <!-- Pipeline boxes -->
  <rect x="80" y="190" width="160" height="50" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="160" y="212" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Resolve</text>
  <text x="160" y="228" text-anchor="middle" fill="#8b949e" font-size="10">validate + merge refs</text>

  <path d="M240,215 L280,215" stroke="#30363d" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="280" y="190" width="160" height="50" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="360" y="212" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Compile</text>
  <text x="360" y="228" text-anchor="middle" fill="#8b949e" font-size="10">YAML to LangGraph</text>

  <path d="M440,215 L480,215" stroke="#30363d" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="480" y="190" width="240" height="50" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="600" y="212" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Execute</text>
  <text x="600" y="228" text-anchor="middle" fill="#8b949e" font-size="10">StateGraph + checkpointing</text>

  <!-- Arrow down from Execute -->
  <path d="M600,260 L600,280" stroke="#30363d" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- INFRASTRUCTURE LAYER -->
  <rect x="40" y="285" width="720" height="100" rx="8" fill="#0f3460" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="305" fill="#d2a8ff" font-size="11" font-weight="600" letter-spacing="1">INFRASTRUCTURE</text>

  <rect x="60" y="315" width="210" height="55" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="165" y="335" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">7 LLM Providers</text>
  <text x="165" y="350" text-anchor="middle" fill="#8b949e" font-size="10">Anthropic / OpenAI / Google</text>
  <text x="165" y="363" text-anchor="middle" fill="#8b949e" font-size="10">Ollama / OpenRouter / Groq</text>

  <rect x="290" y="315" width="220" height="55" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="335" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">MCP Tool Servers</text>
  <text x="400" y="350" text-anchor="middle" fill="#8b949e" font-size="10">GitHub / databases / Slack</text>
  <text x="400" y="363" text-anchor="middle" fill="#8b949e" font-size="10">Docker sandboxed execution</text>

  <rect x="530" y="315" width="210" height="55" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="635" y="335" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Governance (AGT)</text>
  <text x="635" y="350" text-anchor="middle" fill="#8b949e" font-size="10">IAM scopes / policy engine</text>
  <text x="635" y="363" text-anchor="middle" fill="#8b949e" font-size="10">hash-chained audit trail</text>

  <!-- Arrow down -->
  <path d="M400,385 L400,405" stroke="#30363d" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- OUTPUT LAYER -->
  <rect x="40" y="410" width="720" height="75" rx="8" fill="#1c1e3a" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="430" fill="#f778ba" font-size="11" font-weight="600" letter-spacing="1">OUTPUT</text>

  <rect x="60" y="440" width="210" height="34" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="165" y="462" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Structured Results</text>

  <rect x="290" y="440" width="220" height="34" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="462" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Audit Log + Review Queue</text>

  <rect x="530" y="440" width="210" height="34" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="635" y="462" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">OTel Traces + Metrics</text>

  <!-- Footer -->
  <text x="400" y="508" text-anchor="middle" fill="#484f58" font-size="10">swarmkit eject exports standalone LangGraph Python code at any time</text>
</svg>
