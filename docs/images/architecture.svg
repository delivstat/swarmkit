<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
    <marker id="arrowhead-h" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#484f58"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e6edf3" font-size="16" font-weight="600">How SwarmKit Works</text>

  <!-- ===== INPUT LAYER (y=50) ===== -->
  <rect x="40" y="50" width="720" height="75" rx="8" fill="#1a1a2e" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="70" fill="#7ee787" font-size="11" font-weight="600" letter-spacing="1">YOU WRITE YAML</text>

  <rect x="60" y="80" width="200" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="160" y="95" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Topology</text>
  <text x="160" y="109" text-anchor="middle" fill="#8b949e" font-size="10">agents + hierarchy</text>

  <rect x="290" y="80" width="200" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="390" y="95" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Archetypes + Skills</text>
  <text x="390" y="109" text-anchor="middle" fill="#8b949e" font-size="10">reusable agent configs</text>

  <rect x="520" y="80" width="220" height="36" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="630" y="95" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">MCP Servers</text>
  <text x="630" y="109" text-anchor="middle" fill="#8b949e" font-size="10">7,000+ tools available</text>

  <!-- Arrow: Input → Runtime (centered, 40px gap) -->
  <path d="M400,125 L400,165" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== RUNTIME LAYER (y=170) ===== -->
  <rect x="40" y="170" width="720" height="105" rx="8" fill="#16213e" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="190" fill="#58a6ff" font-size="11" font-weight="600" letter-spacing="1">SWARMKIT RUNTIME</text>

  <rect x="80" y="200" width="160" height="50" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="160" y="222" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Resolve</text>
  <text x="160" y="238" text-anchor="middle" fill="#8b949e" font-size="10">validate + merge refs</text>

  <!-- Horizontal arrow: Resolve → Compile -->
  <path d="M240,225 L290,225" stroke="#484f58" stroke-width="2" marker-end="url(#arrowhead-h)"/>

  <rect x="300" y="200" width="160" height="50" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="380" y="222" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Compile</text>
  <text x="380" y="238" text-anchor="middle" fill="#8b949e" font-size="10">YAML to LangGraph</text>

  <!-- Horizontal arrow: Compile → Execute -->
  <path d="M460,225 L510,225" stroke="#484f58" stroke-width="2" marker-end="url(#arrowhead-h)"/>

  <rect x="520" y="200" width="220" height="50" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="630" y="222" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Execute</text>
  <text x="630" y="238" text-anchor="middle" fill="#8b949e" font-size="10">StateGraph + checkpointing</text>

  <!-- Arrow: Runtime → Infrastructure (centered, 40px gap) -->
  <path d="M400,275 L400,315" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== INFRASTRUCTURE LAYER (y=320) ===== -->
  <rect x="40" y="320" width="720" height="100" rx="8" fill="#0f3460" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="340" fill="#d2a8ff" font-size="11" font-weight="600" letter-spacing="1">INFRASTRUCTURE</text>

  <rect x="60" y="350" width="210" height="55" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="165" y="370" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">7 LLM Providers</text>
  <text x="165" y="385" text-anchor="middle" fill="#8b949e" font-size="10">Anthropic / OpenAI / Google</text>
  <text x="165" y="398" text-anchor="middle" fill="#8b949e" font-size="10">Ollama / OpenRouter / Groq</text>

  <rect x="290" y="350" width="220" height="55" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="370" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">MCP Tool Servers</text>
  <text x="400" y="385" text-anchor="middle" fill="#8b949e" font-size="10">GitHub / databases / Slack</text>
  <text x="400" y="398" text-anchor="middle" fill="#8b949e" font-size="10">Docker sandboxed execution</text>

  <rect x="530" y="350" width="210" height="55" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="635" y="370" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Governance (AGT)</text>
  <text x="635" y="385" text-anchor="middle" fill="#8b949e" font-size="10">IAM scopes / policy engine</text>
  <text x="635" y="398" text-anchor="middle" fill="#8b949e" font-size="10">hash-chained audit trail</text>

  <!-- Arrow: Infrastructure → Output (centered, 40px gap) -->
  <path d="M400,420 L400,460" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ===== OUTPUT LAYER (y=465) ===== -->
  <rect x="40" y="465" width="720" height="75" rx="8" fill="#1c1e3a" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  <text x="60" y="485" fill="#f778ba" font-size="11" font-weight="600" letter-spacing="1">OUTPUT</text>

  <rect x="60" y="495" width="210" height="34" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="165" y="517" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Structured Results</text>

  <rect x="290" y="495" width="220" height="34" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="517" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">Audit Log + Review Queue</text>

  <rect x="530" y="495" width="210" height="34" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="635" y="517" text-anchor="middle" fill="#e6edf3" font-weight="500" font-size="12">OTel Traces + Metrics</text>

  <!-- Footer -->
  <text x="400" y="565" text-anchor="middle" fill="#484f58" font-size="10">swarmkit eject exports standalone LangGraph Python code at any time</text>
</svg>
